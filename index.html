    <!-- Redirect Script -->
    <script>
        (function () {
            var path = window.location.pathname;
            // Only redirect if at the absolute root without any existing language subdirectory
            if (path === '/' || path === '/index.html') {
                var lang = navigator.language || navigator.userLanguage;
                // Check if user has explicitly asked for a language via localStorage from a previous visit
                var savedLang = localStorage.getItem('tomocraft-lang');

                if (savedLang === 'ja' || (!savedLang && lang.startsWith('ja'))) {
                    window.location.replace('/ja/');
                } else {
                    window.location.replace('/en/');
                }
            }
        })();
    </script>
